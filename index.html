<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>国名しりとり出題ツール</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 16px;
    max-width: 800px;
    margin: auto;
}

/* カード（設定項目） */
.card {
    background: #fff;
    padding: 10px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    margin-bottom: 10px;
}

/* 入力欄・ボタン（Ultra Engine Pro 風） */
.numBtn {
    width: 34px;
    height: 34px;
    font-size: 20px;
    border: none;
    border-radius: 6px;
    background: #007aff;
    color: white;
}
.smallInput {
    width: 34px;
    height: 30px;
    font-size: 17px;
    text-align: center;
    border-radius: 6px;
}
button.mainBtn {
    width: 100%;
    padding: 12px;
    font-size: 20px;
    background: #007aff;
    color: white;
    border: none;
    border-radius: 8px;
}

/* 結果カード（色分け） */
.resultCard {
    padding: 10px 12px;
    margin-bottom: 8px;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 16px;
}

/* 0件（グレー） */
.resultCard.zero {
    background: #f0f0f0;
    border: 1px solid #d0d0d0;
    color: #666;
}

/* 1件以上（青） */
.resultCard.low {
    background: #e8f2ff;
    border: 1px solid #7ab4ff;
    color: #004a99;
}

/* 多件数（緑） */
.resultCard.high {
    background: #e6ffe6;
    border: 1px solid #66cc66;
    color: #006600;
}

/* Copy ボタン */
.copyBtn {
    background: #007aff;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 14px;
    cursor: pointer;
}

/* 上位コピー用ボタン */
.topCopyBtn {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    background: #34c759;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>
<body>

<h2>国名しりとり出題ツール</h2>

<!-- 国数・開始字・終了字 -->
<div class="card">
    <label>国数 / 開始字 / 終了字</label><br>
    <div style="display:flex; align-items:center; gap:20px; flex-wrap:wrap;">
        <div>
            <button onclick="decN()" class="numBtn">−</button>
            <input id="chainN" type="number" value="3" min="1" class="smallInput">
            <button onclick="incN()" class="numBtn">＋</button>
        </div>
        <div>
            <input id="startChar" type="text" maxlength="1" class="smallInput" placeholder="開始">
        </div>
        <div>
            <input id="endChar" type="text" maxlength="1" class="smallInput" placeholder="終了">
        </div>
    </div>
</div>

<!-- 辞書 -->
<div class="card">
    <label>辞書</label><br>
    <select id="dictMode" style="width:100%;">
        <option value="country">国名</option>
        <option value="capital">首都</option>
        <option value="both">両方</option>
    </select>
</div>

<!-- 0件フィルタ -->
<div class="card">
    <label>0件フィルタ</label><br>
    <select id="zeroFilter" style="width:100%;">
        <option value="all">全て表示</option>
        <option value="exclude">0件を除外</option>
        <option value="only">0件のみ</option>
    </select>
</div>

<!-- 解1つ表示 + 上位コピー（横並び） -->
<div style="display:flex; gap:10px;">

    <div class="card" style="flex:1;">
        <label>
            <input type="checkbox" id="showExample">
            解を1つ表示（コピーには含めない）
        </label>
    </div>

    <div class="card" style="flex:1;">
        <label>上位〇件コピー</label>
        <div style="display:flex; gap:10px; align-items:center;">
            <input id="topN" type="number" value="10" min="1" style="width:60px;">
            <button class="topCopyBtn" id="topCopyBtn" onclick="copyTopN()">コピー</button>
        </div>
    </div>

</div>

<!-- ソート -->
<div class="card">
    <label>ソート順</label><br>
    <select id="sortMode" style="width:100%;">
        <option value="gojuon">50音順</option>
        <option value="asc">少ない順</option>
        <option value="desc">多い順</option>
        <option value="random">ランダム</option>
    </select>
</div>

<!-- 実行ボタン -->
<div class="card">
    <button class="mainBtn" onclick="runCount()">集計する</button>
</div>

<!-- 結果カード -->
<div id="result"></div>

<script src="dictionary.js"></script>

<script>
let lastEntries = [];

// ひらがな → カタカナ
function hiraToKata(str) {
    return str.replace(/[\u3041-\u3096]/g, ch =>
        String.fromCharCode(ch.charCodeAt(0) + 0x60)
    );
}

// 先頭文字の正規化
function normalizeHead(word) {
    if (!word) return "";
    word = hiraToKata(word);
    return word[0] === "ー" ? "" : word[0];
}

// 末尾文字の正規化
function normalizeTail(word) {
    if (!word) return "";
    word = hiraToKata(word);
    let last = word.slice(-1);
    if (last === "ー" && word.length >= 2) {
        last = word[word.length - 2];
    }
    return last;
}

// 国数 +
function incN() {
    const el = document.getElementById("chainN");
    el.value = Number(el.value) + 1;
}

// 国数 -
function decN() {
    const el = document.getElementById("chainN");
    if (Number(el.value) > 1) el.value = Number(el.value) - 1;
}

// 集計（例1つ含む）
function countChainsByStartEnd(list, N, startFilter) {
    const result = {};
    const headsSet = new Set();
    const tailsSet = new Set();

    for (const w of list) {
        headsSet.add(normalizeHead(w));
        tailsSet.add(normalizeTail(w));
    }

    const heads = [...headsSet].filter(h => !startFilter || h === startFilter);
    if (!startFilter) heads.length = 0, heads.push(...headsSet);

    const tails = [...tailsSet];

    for (const h of heads) {
        for (const t of tails) {
            result[`${h}→${t}`] = { count: 0, example: null };
        }
    }

    function dfs(chain) {
        if (chain.length === N) {
            const s = normalizeHead(chain[0]);
            const e = normalizeTail(chain[N - 1]);
            const key = `${s}→${e}`;
            result[key].count++;
            if (!result[key].example) {
                result[key].example = chain.join(" → ");
            }
            return;
        }

        const last = chain[chain.length - 1];
        const nextHead = normalizeTail(last);

        for (const w of list) {
            if (chain.includes(w)) continue;
            if (normalizeHead(w) !== nextHead) continue;
            dfs([...chain, w]);
        }
    }

    for (const w of list) {
        if (startFilter && normalizeHead(w) !== startFilter) continue;
        dfs([w]);
    }

    return result;
}

// 行コピー（例は含めない）
function copyText(btn, text) {
    navigator.clipboard.writeText(text);
    const original = btn.textContent;
    btn.textContent = "Copied!";
    btn.style.backgroundColor = "#555";
    setTimeout(() => {
        btn.textContent = original;
        btn.style.backgroundColor = "#007aff";
    }, 800);
}

// 上位N件コピー
function copyTopN() {
    const btn = document.getElementById("topCopyBtn");
    const n = Number(document.getElementById("topN").value);
    if (!lastEntries.length || n <= 0) return;

    const lines = lastEntries.slice(0, n).map(([key, val]) =>
        `${key}　${val.count}通り`
    );

    navigator.clipboard.writeText(lines.join("\n"));

    const original = btn.textContent;
    btn.textContent = "Copied!";
    btn.style.backgroundColor = "#0b8f3a";
    setTimeout(() => {
        btn.textContent = original;
        btn.style.backgroundColor = "#34c759";
    }, 800);
}

// 実行
function runCount() {
    const resultBox = document.getElementById("result");

    if (!window.DICT || !window.DICT.country) {
        resultBox.innerHTML = "<div class='resultCard zero'>辞書（dictionary.js）が読み込まれていません。</div>";
        return;
    }

    resultBox.innerHTML = "<div class='resultCard low'>集計中...</div>";

    setTimeout(() => {
        const N = Number(document.getElementById("chainN").value);
        const dictMode = document.getElementById("dictMode").value;

        let startChar = document.getElementById("startChar").value.trim();
        let endChar   = document.getElementById("endChar").value.trim();

        startChar = startChar ? normalizeHead(startChar) : "";
        endChar   = endChar   ? normalizeHead(endChar)   : "";

        const zeroFilter = document.getElementById("zeroFilter").value;
        const sortMode   = document.getElementById("sortMode").value;
        const showExample = document.getElementById("showExample").checked;

        let list = [];
        if (dictMode === "country") list = window.DICT.country;
        if (dictMode === "capital") list = window.DICT.capital;
        if (dictMode === "both")    list = [...window.DICT.country, ...window.DICT.capital];

        const res = countChainsByStartEnd(list, N, startChar || null);
        let entries = Object.entries(res);

        if (endChar) entries = entries.filter(([key]) => key.endsWith(endChar));

        if (zeroFilter === "exclude") entries = entries.filter(([k, v]) => v.count > 0);
        else if (zeroFilter === "only") entries = entries.filter(([k, v]) => v.count === 0);

        if (sortMode === "gojuon") entries.sort((a, b) => a[0].localeCompare(b[0], "ja"));
        else if (sortMode === "asc") entries.sort((a, b) => a[1].count - b[1].count);
        else if (sortMode === "desc") entries.sort((a, b) => b[1].count - a[1].count);
        else if (sortMode === "random") entries.sort(() => Math.random() - 0.5);

        lastEntries = entries;

        let outHTML = "";

        for (const [key, val] of entries) {
            const count = val.count;
            const example = val.example;
            let cls = "low";
            if (count === 0) cls = "zero";
            else if (count >= 100) cls = "high";

            let label = `${key}　${count}通り`;
            let exampleHtml = showExample && example ? `（例：${example}）` : "";

            const copyTextValue = `${key}　${count}通り`;

            outHTML += `
                <div class="resultCard ${cls}">
                    <span>${label}${exampleHtml}</span>
                    <button class="copyBtn" onclick="copyText(this, '${copyTextValue}')">Copy</button>
                </div>
            `;
        }

        resultBox.innerHTML = outHTML || "<div class='resultCard zero'>該当なし</div>";
    }, 50);
}
</script>

</body>
</html>
